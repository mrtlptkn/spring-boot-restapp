spring.application.name=spring-boot-restapp

# Aktif profil: dev, prod (application-{profile}.properties dosyalari ile override edilir)
spring.profiles.active=dev

# Database Configuration jdbc:h2:mem:testdb -> memory database for testing
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:C:/data/testdb;
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.hikari.pool-name=HikariCP


# Secondary H2 database
spring.second-datasource.url=jdbc:h2:file:C:/data/secondarydb
spring.second-datasource.driver-class-name=org.h2.Driver
spring.second-datasource.username=sa
spring.second-datasource.password=password


# JPA / Hibernate Configuration
# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Apply entity schema updates automatically
spring.jpa.hibernate.ddl-auto=update
# Log generated SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.path=/h2-console

# Database console URL
# http://localhost:8080/h2-console

# Select the email provider used by product creation
email.service=sendGrid
springdoc.swagger-ui.tagsSorter=alpha

# Actuator - production izlenebilirlik endpoint'leri
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized