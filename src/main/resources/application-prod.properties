# Production ortami profili - performans odakli, minimal loglama
spring.jpa.show-sql=false

# Prod ortaminda sema degisiklikleri migration araclariyla (Flyway/Liquibase) yonetilmeli,
# ddl-auto yalnizca mevcut semayi dogrular, otomatik degisiklik yapmaz.
spring.jpa.hibernate.ddl-auto=validate

# Prod ortaminda gercek email saglayicisi kullanilir
email.service=sendGrid

# Hassas health detaylari production'da disariya acilmaz
management.endpoint.health.show-details=never
