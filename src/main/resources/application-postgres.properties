# PostgreSQL profili - docker-compose.yml'deki 'postgres' servisine baglanir
# Baslatmak icin: docker compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Secondary veri kaynagi da ayni Postgres konteynerine baglanir (H2 dosya kilidi sorunu olmadan)
spring.second-datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.second-datasource.username=root
spring.second-datasource.password=admin
spring.second-datasource.driver-class-name=org.postgresql.Driver
